# Local dev stack. Prod swaps MinIO for AWS S3 and Mailpit for a real SMTP provider
# (same APIs, no code change).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: govfill
      POSTGRES_PASSWORD: govfill
      POSTGRES_DB: govfill
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govfill"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # Dev mail sink: catches all outbound email; web UI at http://localhost:8025.
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  api:
    build: ./backend
    # entrypoint.sh applies migrations, then starts uvicorn. Run via `sh` so we don't
    # depend on the exec bit surviving the Windows bind mount.
    command: ["sh", "entrypoint.sh"]
    env_file: .env
    environment:
      # Document AI (Phase 4) uses GCP Application Default Credentials, not the
      # Gemini API key — the google-cloud client library reads this path itself, it's
      # not a pydantic-settings value, so it's set here rather than in .env. The
      # `environment:` block overrides any same-named var from `env_file:` (.env
      # deliberately leaves GOOGLE_APPLICATION_CREDENTIALS blank for local/non-Docker
      # runs). See the volume mount below and README.md's Document AI setup section.
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    volumes:
      - ./backend:/app
      # Mounts your local `gcloud auth application-default login` credentials into
      # the container read-only. GCLOUD_ADC_HOST_PATH (set in .env) is the host path
      # gcloud printed after that login; the ./README.md fallback is a harmless
      # placeholder so `docker compose up` still works when you haven't set it (or
      # aren't using Document AI locally) — Document AI auth then fails cleanly
      # rather than blocking the rest of the stack.
      - ${GCLOUD_ADC_HOST_PATH:-./README.md}:/root/.config/gcloud/application_default_credentials.json:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file: .env
    environment:
      # See the `api` service's comment above — this is what actually calls Document
      # AI (fill_form_task, for an inferred/unrecognized form), so it's the service
      # that matters most for this mount.
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    volumes:
      - ./backend:/app
      - ${GCLOUD_ADC_HOST_PATH:-./README.md}:/root/.config/gcloud/application_default_credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      # Vite proxies /api -> the api service inside the compose network.
      VITE_API_PROXY_TARGET: http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  minio-data:
