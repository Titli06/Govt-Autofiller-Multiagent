<!doctype html>
<html>
  <body style="font-family: Arial, Helvetica, sans-serif; color: #1a1a1a; margin: 0; padding: 24px; background: #f5f5f5;">
    <div style="max-width: 480px; margin: 0 auto; background: #ffffff; border-radius: 8px; padding: 32px;">
      <h1 style="font-size: 20px; margin: 0 0 16px;">Verify your GovFill account</h1>
      <p style="font-size: 14px; line-height: 1.5;">
        Confirm your email address to finish setting up your account. This link expires in 24 hours.
      </p>
      <p style="margin: 24px 0;">
        <a href="{{verify_url}}"
           style="display: inline-block; background: #1a56db; color: #ffffff; text-decoration: none; padding: 12px 20px; border-radius: 6px; font-size: 14px; font-weight: bold;">
          Verify email
        </a>
      </p>
      <p style="font-size: 12px; color: #666; line-height: 1.5;">
        If the button doesn't work, paste this link into your browser:<br />
        <span style="word-break: break-all;">{{verify_url}}</span>
      </p>
      <p style="font-size: 12px; color: #666;">
        If you didn't create a GovFill account, you can ignore this email.
      </p>
    </div>
  </body>
</html>
